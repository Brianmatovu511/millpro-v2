name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: millpro_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/millpro_test
      JWT_SECRET: ci-test-secret-key-min-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache client node_modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push DB schema
        run: npx prisma db push --force-reset

      - name: Run tests with coverage
        run: npm test -- --coverage --forceExit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t millpro:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run -d --name test-container \
            -e DATABASE_URL="postgresql://dummy/dummy" \
            -e JWT_SECRET="test-secret-key-min-32-characters" \
            -e NODE_ENV=production \
            -p 5000:5000 \
            millpro:${{ github.sha }} || true
          sleep 3
          docker logs test-container || true
          docker stop test-container || true
