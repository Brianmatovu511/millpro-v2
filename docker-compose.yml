services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: millpro
      POSTGRES_PASSWORD: millpro
      POSTGRES_DB: millpro
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U millpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://millpro:millpro@db:5432/millpro
      JWT_SECRET: codespaces-dev-secret-change-in-production
      NODE_ENV: production
      PORT: 5000

volumes:
  pg_data:
